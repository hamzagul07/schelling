name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        # The one documented install command — installs every extra so partial syncs can never
        # silently remove each other (D7.0). Cached across runs.
        run: uv sync --all-extras

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy (strict, whole package)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Evidence drift (paper-evidence --check)
        # Fails the build only if a SCIENCE number in paper/EVIDENCE.md drifts from HEAD; warns on
        # provenance/test-count drift (D18.3). DEU-derived tags are skipped here because the DEU
        # dataset is gitignored on CI — those numbers are guarded by the (data-gated) local tests.
        run: uv run schelling paper-evidence --check
