name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        # The one documented install command — installs every extra so partial syncs can never
        # silently remove each other (D7.0). Cached across runs.
        run: uv sync --all-extras

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy (strict on the solver)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
